<div class="flex flex-col min-h-screen bg-slate-50 font-sans">
  
  <app-navbar class="sticky top-0 z-50"></app-navbar>

  <div *ngIf="auth.isLoggedIn()" class="flex flex-1 overflow-hidden">
    
    <aside class="hidden md:block w-72 bg-slate-900 shadow-2xl z-40">
      <app-sidebar class="h-full"></app-sidebar>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
        
        <div class="max-w-7xl mx-auto pb-20">
          <router-outlet></router-outlet>
        </div>

      </div>
    </main>
  </div>

  <div *ngIf="!auth.isLoggedIn()" class="flex-1">
    <main class="min-h-[calc(100vh-64px)]"> 
      <router-outlet></router-outlet>
    </main>
  </div>

  <app-footer *ngIf="!auth.isLoggedIn()" class="border-t border-slate-200"></app-footer>

</div>
