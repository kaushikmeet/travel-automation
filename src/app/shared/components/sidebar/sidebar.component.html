<div class="w-72 h-screen bg-slate-950 text-slate-300 flex flex-col border-r border-slate-800 shadow-2xl">

  <div class="p-6 flex flex-col gap-1">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">
        <i class="fas fa-plane-departure text-white text-sm"></i>
      </div>
      <span class="text-xl font-bold text-white tracking-tight">Travel<span class="text-indigo-400">Admin</span></span>
    </div>
    <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-semibold mt-2">
      {{ today | date:'fullDate' }}
    </p>
  </div>

  <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto custom-scrollbar">
    <p class="px-3 text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-4">Main Menu</p>
    
    <a
      *ngFor="let item of filteredMenu()"
      [routerLink]="item.route"
      routerLinkActive="bg-indigo-600/10 text-indigo-400 !border-indigo-500"
      class="group flex items-center gap-3 px-3 py-3 rounded-xl border border-transparent hover:bg-slate-900 transition-all duration-200"
    >
      <i [class]="item.icon + ' text-lg w-6 transition-colors group-hover:text-indigo-400'"></i>
      <span class="font-medium text-sm">{{ item.label }}</span>
      
      <div class="ml-auto w-1.5 h-1.5 rounded-full bg-indigo-500 opacity-0 group-[.active]:opacity-100"></div>
    </a>
  </nav>

  <div class="p-4 border-t border-slate-900 bg-slate-950/50">
    <div class="flex items-center gap-3 p-2 rounded-2xl bg-slate-900/50">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-lg">
        {{ (auth.user()?.name || 'A')[0].toUpperCase() }}
      </div>
      <div class="flex flex-col overflow-hidden">
        <span class="text-sm font-bold text-white truncate">{{ auth.user()?.name }}</span>
        <span class="text-[10px] text-slate-500 uppercase font-black tracking-tighter">{{ auth.user()?.role }}</span>
      </div>
    </div>
  </div>

</div>
