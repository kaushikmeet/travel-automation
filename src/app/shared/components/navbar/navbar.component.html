<nav class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-gray-100 text-slate-700">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-indigo-200 shadow-lg">
          <span class="text-white font-bold text-xl">T</span>
        </div>
        <span class="text-xl font-extrabold tracking-tight text-slate-900">
          Travel <span class="text-indigo-600">AI</span>
        </span>
      </div>

      <div *ngIf="!auth.isLoggedIn()" class="hidden md:flex items-center space-x-8">
        <a routerLink="/packages" routerLinkActive="text-indigo-600" class="text-sm font-medium hover:text-indigo-600 transition-colors">Packages</a>
        <a routerLink="/destinations" routerLinkActive="text-indigo-600" class="text-sm font-medium hover:text-indigo-600 transition-colors">Destinations</a>
        <a routerLink="/bookings" routerLinkActive="text-indigo-600" class="text-sm font-medium hover:text-indigo-600 transition-colors">Bookings</a>
      </div>

      <div class="hidden md:flex items-center gap-4">
        
        <ng-container *ngIf="!auth.isLoggedIn()">
          <button routerLink="/auth/login" class="text-sm font-semibold px-5 py-2.5 rounded-xl hover:bg-slate-50 transition">
            Sign In
          </button>
          <button routerLink="/auth/register" class="text-sm font-semibold bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-100 transition">
            Get Started
          </button>
        </ng-container>

        <div *ngIf="auth.isLoggedIn()" class="flex items-center gap-3 pl-4 border-l border-gray-100">
          <div class="flex flex-col items-end">
            <span class="text-xs text-gray-400 font-medium">Welcome back,</span>
            <span class="text-sm font-bold text-slate-800">{{ user?.name || 'Explorer' }}</span>
          </div>
          <div class="w-10 h-10 rounded-full bg-indigo-100 border-2 border-white shadow-sm flex items-center justify-center text-indigo-700 font-bold">
            {{ (user?.name || 'A')[0].toUpperCase() }}
          </div>
          <button (click)="logout()" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all rounded-lg" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      </div>

      <button (click)="toggleMenu()" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition text-slate-600">
        <span class="text-2xl">{{ menuOpen ? '✕' : '☰' }}</span>
      </button>

    </div>
  </div>

  <div *ngIf="menuOpen" class="md:hidden bg-white border-t border-gray-50 px-4 py-6 space-y-4 shadow-xl">
    <div class="flex flex-col gap-4">
      <a routerLink="/packages" (click)="menuOpen = false" class="text-lg font-semibold px-4 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600">Packages</a>
      <a routerLink="/destinations" (click)="menuOpen = false" class="text-lg font-semibold px-4 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600">Destinations</a>
      <a routerLink="/bookings" (click)="menuOpen = false" class="text-lg font-semibold px-4 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600">Bookings</a>
      
      <hr class="border-gray-100">

      <div *ngIf="!auth.isLoggedIn()" class="flex flex-col gap-2">
        <button routerLink="/auth/login" (click)="menuOpen = false" class="w-full text-center py-3 font-bold rounded-xl bg-gray-50">Sign In</button>
        <button routerLink="/auth/register" (click)="menuOpen = false" class="w-full text-center py-3 font-bold rounded-xl bg-indigo-600 text-white">Join Now</button>
      </div>

      <div *ngIf="auth.isLoggedIn()" class="space-y-4">
        <div class="px-4 py-2 bg-slate-50 rounded-xl flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold">
             {{ (user?.name || 'A')[0] }}
          </div>
          <span class="font-bold">{{ user?.name }}</span>
        </div>
        <button (click)="logout()" class="w-full py-3 bg-red-50 text-red-600 font-bold rounded-xl">Logout</button>
      </div>
    </div>
  </div>
</nav>
