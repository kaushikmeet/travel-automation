<div class="p-6 bg-gray-50 min-h-screen">
  <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
    <div>
      <h2 class="text-2xl font-extrabold text-gray-800 tracking-tight">Dashboard Analytics</h2>
      <p class="text-sm text-gray-500">Welcome back! Here's what's happening with your projects today.</p>
    </div>
    <div class="flex items-center gap-3">
      <button class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition">Export PDF</button>
      <button class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm transition">Generate Report</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white shadow-sm hover:shadow-md transition-shadow rounded-2xl p-6 border border-gray-100">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-gray-500 text-sm font-medium uppercase tracking-wider">Total Users</h3>
        <span class="p-2 bg-blue-50 text-blue-600 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        </span>
      </div>
      <div class="flex items-baseline gap-2">
        <p class="text-3xl font-bold text-gray-900">1,200</p>
        <span class="text-xs font-semibold text-green-500 bg-green-50 px-2 py-0.5 rounded-full">+12%</span>
      </div>
    </div>

    <div class="bg-white shadow-sm hover:shadow-md transition-shadow rounded-2xl p-6 border border-gray-100">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-gray-500 text-sm font-medium uppercase tracking-wider">Total Bookings</h3>
        <span class="p-2 bg-green-50 text-green-600 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        </span>
      </div>
      <div class="flex items-baseline gap-2">
        <p class="text-3xl font-bold text-gray-900">450</p>
        <span class="text-xs font-semibold text-red-500 bg-red-50 px-2 py-0.5 rounded-full">-3%</span>
      </div>
    </div>

    <div class="bg-white shadow-sm hover:shadow-md transition-shadow rounded-2xl p-6 border border-gray-100">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-gray-500 text-sm font-medium uppercase tracking-wider">Total Revenue</h3>
        <span class="p-2 bg-purple-50 text-purple-600 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </span>
      </div>
      <div class="flex items-baseline gap-2">
        <p class="text-3xl font-bold text-gray-900">₹ 3,50,000</p>
        <span class="text-xs font-semibold text-green-500 bg-green-50 px-2 py-0.5 rounded-full">+24%</span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white shadow-sm rounded-2xl p-6 border border-gray-100 lg:col-span-2">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-bold text-gray-800">Revenue Analysis</h3>
        <select class="text-xs border-none bg-gray-100 rounded-md p-1 focus:ring-0">
          <option>Last 7 Days</option>
          <option>Last 30 Days</option>
        </select>
      </div>
      <div class="h-64 flex items-center justify-center bg-gray-50 rounded-xl border border-dashed border-gray-200">
         <!-- <p class="text-gray-400 text-sm">Chart.js Implementation Here</p> -->
         <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <div class="bg-white shadow-sm rounded-2xl p-6 border border-gray-100">
      <h3 class="text-lg font-bold text-gray-800 mb-6">User Distribution</h3>
      <div class="h-64 flex items-center justify-center bg-gray-50 rounded-xl border border-dashed border-gray-200">
         <!-- <p class="text-gray-400 text-sm">Pie Chart Implementation Here</p> -->
          <canvas id="usersChart"></canvas>
      </div>
    </div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-1 gap-6 pt-3">
    <div class="bg-white shadow-sm rounded-2xl p-6 border border-gray-100 lg:col-span-2">
        <div class="mb-6">
            <h3 class="text-lg font-bold text-gray-800">Revenue Analysis</h3>
            <div class="h-64 flex items-center justify-center bg-gray-50 rounded-xl border border-dashed border-gray-200">
                <canvas id="packagesChart"></canvas>
            </div>
        </div>
    </div>
  </div>
</div>
