<div class="min-h-screen bg-slate-50 py-12 px-4">
  <div class="max-w-3xl mx-auto">
    
    <button routerLink="/itinerary-list" class="flex items-center text-slate-500 hover:text-indigo-600 mb-6 transition-colors group">
      <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
      <span class="text-sm font-medium">Back to Itineraries</span>
    </button>

    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
      
      <div class="bg-gradient-to-r from-indigo-600 to-violet-600 px-8 py-10 text-white">
        <div class="flex items-center gap-4 mb-2">
          <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md">
            <i class="fa-solid fa-map-location-dot text-2xl"></i>
          </div>
          <h1 class="text-3xl font-extrabold tracking-tight">Create Itinerary</h1>
        </div>
        <p class="text-indigo-100 opacity-90">Define the daily schedule and pricing for your new travel plan.</p>
      </div>

      <div class="p-8 space-y-8">
        
        <section class="space-y-5">
          <div class="flex items-center gap-2 mb-2 text-indigo-600">
            <i class="fa-solid fa-circle-info text-xs"></i>
            <span class="text-xs font-bold uppercase tracking-widest">General Details</span>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1">Itinerary Title</label>
            <div class="relative">
              <i class="fa-solid fa-pen-nib absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input
                [(ngModel)]="form.title"
                placeholder="e.g., Weekend Getaway to Manali"
                class="input-field"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1">Description</label>
            <textarea
              [(ngModel)]="form.description"
              rows="3"
              placeholder="Provide a brief summary of this itinerary..."
              class="input-field resize-none py-3"
            ></textarea>
          </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-50">
          
          <div class="md:col-span-2 space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1">Link to Master Package</label>
            <div class="relative">
              <i class="fa-solid fa-box-archive absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 z-10"></i>
              <select [(ngModel)]="form.packageId" class="input-field appearance-none bg-white relative z-0">
                <option value="">-- Select Master Package --</option>
                <option *ngFor="let p of packages" [value]="p._id">
                  {{ p.title }} (₹{{ p.price }})
                </option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1">Duration (Days)</label>
            <div class="relative">
              <i class="fa-solid fa-calendar-day absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input
                [(ngModel)]="form.duration"
                type="number"
                (change)="generateDays()"
                placeholder="0"
                class="input-field"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1">Itinerary Price (₹)</label>
            <div class="relative">
              <i class="fa-solid fa-indian-rupee-sign absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input
                [(ngModel)]="form.price"
                type="number"
                placeholder="0.00"
                class="input-field"
              />
            </div>
          </div>
        </section>

        <div class="pt-6">
          <button
            (click)="create()"
            [disabled]="loading"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 transition-all transform active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-3"
          >
            <i *ngIf="!loading" class="fa-solid fa-cloud-arrow-up"></i>
            <i *ngIf="loading" class="fa-solid fa-circle-notch animate-spin"></i>
            {{ loading ? 'Synchronizing Data...' : 'Create Itinerary' }}
          </button>
          <p class="text-center text-slate-400 text-xs mt-4 italic">
            Make sure to double-check the duration before creating.
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
