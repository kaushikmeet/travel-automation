<div class="flex flex-col md:flex-row items-center bg-white p-2 rounded-2xl shadow-2xl shadow-indigo-900/20 gap-2">
  <div class="flex-1 flex items-center px-4 w-full">
    <i class="fas fa-search text-slate-400 mr-3"></i>
    <input type="text" [(ngModel)]="keyword" placeholder="Search destinations (e.g. Bali, Paris...)"
      class="w-full py-4 text-slate-700 font-medium focus:outline-none placeholder:text-slate-400">
  </div>

  <button (click)="search()"
    class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-xl font-bold transition-all active:scale-95">
    Search
  </button>
</div>
