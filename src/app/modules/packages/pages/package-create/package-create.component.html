<div class="max-w-4xl mx-auto p-6 bg-white shadow rounded-xl space-y-4">

  <h2 class="text-2xl font-bold">Create Package</h2>

  <form [formGroup]="packageform" (ngSubmit)="submit()" class="space-y-4">

    <input formControlName="title" placeholder="Title"
      class="w-full p-3 border rounded"/>

    <textarea formControlName="description"
      class="w-full p-3 border rounded"></textarea>

    <!-- Destination -->
    <select formControlName="destination"
      class="w-full p-3 border rounded">
      <option value="">Select Destination</option>
      <option *ngFor="let d of destinations" [value]="d._id">
        {{ d.name }} - {{ d.city }}
      </option>
    </select>

    <!-- Price / Days / Nights -->
    <div class="grid grid-cols-3 gap-4">
      <input formControlName="price" placeholder="Price"
        class="p-3 border rounded"/>
      <input formControlName="days" placeholder="Days"
        class="p-3 border rounded"/>
      <input formControlName="nights" placeholder="Nights"
        class="p-3 border rounded"/>
    </div>

    <input formControlName="maxTravelers" placeholder="Max Travelers"
      class="w-full p-3 border rounded"/>

    <!-- Images -->
    <input type="file" multiple (change)="onFileChange($event)"
      class="w-full p-3 border rounded"/>
    <!-- Itinerary -->
    <div formArrayName="itinerary" class="space-y-3">
      <div *ngFor="let day of itinerary.controls; let i=index"
           [formGroupName]="i"
           class="p-4 border rounded bg-gray-50">

        <h3 class="font-bold">Day {{ i + 1 }}</h3>

        <input formControlName="title" placeholder="Title"
          class="w-full p-2 border rounded mt-2"/>

        <textarea formControlName="description"
          class="w-full p-2 border rounded mt-2"></textarea>

        <button type="button" (click)="removeDay(i)"
          class="text-red-500 mt-2">Remove</button>

      </div>
    </div>

    <button type="button" (click)="addDay()"
      class="bg-green-500 text-white px-4 py-2 rounded">
      + Add Day
    </button>

    <button type="submit"
      class="bg-blue-600 text-white px-6 py-2 rounded">
      Create
    </button>

  </form>
</div>
