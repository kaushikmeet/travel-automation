<div class="min-h-screen bg-slate-50 py-10 px-4">
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    
    <div class="bg-indigo-600 p-8 text-white">
      <h1 class="text-3xl font-extrabold tracking-tight">Create Travel Package</h1>
      <p class="mt-2 text-indigo-100 italic">Combine destinations and itineraries into a dream vacation package.</p>
    </div>

    <form [formGroup]="packageform" (ngSubmit)="submit()" class="p-8 space-y-8">
      
      <section>
        <h2 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Package Overview</h2>
        <div class="space-y-4">
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-600 mb-1">Package Title</label>
            <input formControlName="title" placeholder="e.g. 7 Days Luxury Escape to Bali" class="input-style">
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-600 mb-1">Description</label>
            <textarea formControlName="description" rows="3" placeholder="Describe the overall experience..." class="input-style resize-none"></textarea>
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-600 mb-1">Link to Destination</label>
            <select formControlName="destination" class="input-style appearance-none bg-white">
              <option value="">Choose a destination...</option>
              <option *ngFor="let d of destinations" [value]="d._id">
                {{ d.name }} ({{ d.city }}, {{ d.country }})
              </option>
            </select>
          </div>
        </div>
      </section>

      <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="flex flex-col col-span-1">
          <label class="text-sm font-medium text-gray-600 mb-1">Price ($)</label>
          <input type="number" formControlName="price" placeholder="2999" class="input-style">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-600 mb-1">Days</label>
          <input type="number" formControlName="days" placeholder="7" class="input-style">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-600 mb-1">Nights</label>
          <input type="number" formControlName="nights" placeholder="6" class="input-style">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-600 mb-1">Max Travelers</label>
          <input type="number" formControlName="maxTravelers" placeholder="12" class="input-style">
        </div>
      </section>

      <section>
        <h2 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Package Gallery</h2>
        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-indigo-400 transition-colors bg-gray-50 group cursor-pointer relative">
          <div class="space-y-1 text-center">
            <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-indigo-500 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48">
              <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <div class="flex text-sm text-gray-600">
              <label class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500">
                <span>Upload package photos</span>
                <input type="file" multiple (change)="onFileChange($event)" class="sr-only">
              </label>
            </div>
            <p class="text-xs text-gray-500">Selected: {{ selectedFiles.length }} files</p>
          </div>
        </div>
      </section>
      <section>
        <h2 class="text-lg font-semibold text-gray-800 border-b pb-2 mb-4">Categorization</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-600 mb-1">Primary Category</label>
            <select formControlName="category" class="input-style bg-white appearance-none">
              <option value="">Select Category...</option>
              <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
            </select>
            <p class="text-[10px] text-gray-400 mt-1 italic">* This determines the main search filter</p>
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-gray-600 mb-2">Package Tags (Experience-based)</label>
            <div class="flex flex-wrap gap-2">
              <button type="button" 
                *ngFor="let tag of availableTags"
                (click)="onTagToggle(tag)"
                [ngClass]="packageform.get('tags')?.value.includes(tag) ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600'"
                class="px-3 py-1 rounded-full text-xs font-bold transition-all">
                {{ tag }}
              </button>
            </div>
          </div>

        </div>
      </section>
      <section>
        <div class="flex justify-between items-center mb-6 border-b pb-2">
          <h2 class="text-lg font-semibold text-gray-800">Day-by-Day Itinerary</h2>
          <button type="button" (click)="addDay()" 
            class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-4 py-2 rounded-lg text-sm font-bold transition-colors">
            + Add Day
          </button>
        </div>

        <div formArrayName="itinerary" class="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
          
          <div *ngFor="let day of itinerary.controls; let i=index" [formGroupName]="i" 
            class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group animate-in slide-in-from-top-4">
            
            <div class="flex items-center justify-center w-10 h-10 rounded-full border border-white bg-slate-300 text-slate-500 font-bold text-xs shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
              {{ i + 1 }}
            </div>

            <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm">
              <div class="flex justify-between items-start mb-2">
                <h3 class="font-bold text-indigo-600">Day {{ i + 1 }}</h3>
                <button type="button" (click)="removeDay(i)" class="text-red-400 hover:text-red-600 transition-colors">
                   <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                  </svg>
                </button>
              </div>
              <input formControlName="title" placeholder="Morning arrival & Check-in" class="input-style bg-white mb-3">
              <textarea formControlName="description" rows="2" placeholder="Detail the activities for this day..." class="input-style bg-white text-sm resize-none"></textarea>
            </div>
          </div>
        </div>
      </section>

      <div class="pt-6">
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-[0.98]">
          Create Travel Package
        </button>
      </div>

    </form>
  </div>
</div>
