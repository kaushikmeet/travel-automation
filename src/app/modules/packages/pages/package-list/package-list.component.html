<div class="min-h-screen bg-slate-50 p-4 md:p-8">
  <div class="max-w-7xl mx-auto">
    
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
      <div class="space-y-1">
        <h1 class="text-4xl font-black text-slate-900 tracking-tight">Travel Packages</h1>
        <p class="text-slate-500 font-medium flex items-center gap-2">
          <i class="fa-solid fa-box-archive text-indigo-500"></i>
          Curating {{ packages.length }} premium experiences
        </p>
      </div>

      <a routerLink="/packages/create-package" 
        class="flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all transform hover:-translate-y-1 active:scale-95">
        <i class="fa-solid fa-plus-circle text-lg"></i>
        Create Package
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="md:col-span-2 relative">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        <input 
          type="text" 
          placeholder="Search packages by title, destination, or price..." 
          class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all shadow-sm"
        />
      </div>

      <div class="relative">
        <select class="w-full pl-4 pr-10 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none appearance-none cursor-pointer shadow-sm text-slate-600 font-medium">
          <option value="">All Categories</option>
          <option value="luxury">Luxury</option>
          <option value="adventure">Adventure</option>
        </select>
        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs pointer-events-none"></i>
      </div>

      <div class="relative">
        <select class="w-full pl-4 pr-10 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none appearance-none cursor-pointer shadow-sm text-slate-600 font-medium">
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="newest">Newest First</option>
        </select>
        <i class="fa-solid fa-arrow-down-wide-short absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs pointer-events-none"></i>
      </div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50/80 border-b border-slate-100">
              <th class="p-6 text-[11px] font-black uppercase tracking-[0.15em] text-slate-400">Package Details</th>
              <th class="p-6 text-[11px] font-black uppercase tracking-[0.15em] text-slate-400">Location</th>
              <th class="p-6 text-[11px] font-black uppercase tracking-[0.15em] text-slate-400">Price Point</th>
              <th class="p-6 text-[11px] font-black uppercase tracking-[0.15em] text-slate-400 text-right">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            
            <tr *ngFor="let p of packages" class="hover:bg-indigo-50/20 transition-all group">
              
              <td class="p-6">
                <div class="flex items-center gap-4">
                  <div class="w-20 h-14 rounded-xl overflow-hidden shadow-md border-2 border-white group-hover:scale-110 transition-transform duration-300 shrink-0">
                    <img [src]="imageUrl + p.images[0]" class="w-full h-full object-cover">
                  </div>
                  <div class="flex flex-col min-w-0">
                    <span class="font-bold text-slate-800 tracking-tight truncate group-hover:text-indigo-600 transition-colors">{{ p.title }}</span>
                    <span class="text-[10px] font-mono text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded w-fit mt-1 uppercase">PKG_{{ p._id.slice(-6) }}</span>
                  </div>
                </div>
              </td>

              <td class="p-6">
                <div class="flex flex-col">
                  <span class="text-sm font-bold text-slate-700">{{ p.destination?.name }}</span>
                  <span class="text-xs text-slate-400">{{ p.destination?.city }}</span>
                </div>
              </td>

              <td class="p-6">
                <div class="inline-flex items-center px-3 py-1 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-lg font-black text-xs">
                  ₹{{ p.price | number }}
                </div>
              </td>

              <td class="p-6">
                <div class="flex justify-end gap-3">
                  <a [routerLink]="['/packages/update-package', p._id]" 
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-sm border border-slate-100">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </a>
                  
                  <button (click)="delete(p._id)" 
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-400 hover:bg-rose-500 hover:text-white transition-all shadow-sm border border-slate-100">
                    <i class="fa-solid fa-trash-can"></i>
                  </button>
                </div>
              </td>

            </tr>
          </tbody>
        </table>
      </div>

      <div class="p-6 bg-slate-50/50 border-t border-slate-100 flex items-center justify-between">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">
          Viewing {{ packages.length }} package entries
        </p>
        
        <div class="flex items-center gap-2">
          <button class="nav-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
          <button class="nav-btn active">1</button>
          <button class="nav-btn">2</button>
          <button class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
