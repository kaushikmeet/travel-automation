<div class="p-6">
<div class="flex justify-between">
<h1 class="text-2xl font-bold mb-4">Packages</h1>

<a routerLink="/packages/create-package"
class="bg-blue-600 text-white px-4 py-2 rounded mb-4 inline-block">
Create Package
</a>
</div>

<div class="grid grid-cols-3 gap-6 p-0">
  <div *ngFor="let p of packages"
       class="bg-white shadow rounded-lg overflow-hidden">

    <img [src]="imageUrl + p.images[0]"
         class="h-48 w-full object-cover"/>

    <div class="p-4">
      <h3 class="font-bold text-lg">{{ p.title }}</h3>
      <p class="text-sm text-gray-500">{{ p.destination?.name}} - {{ p.destination?.city}}</p>

      <div class="flex justify-between mt-3">
        <button (click)="delete(p._id)"
          class="text-red-500 cursor-pointer">Delete</button>

        <button [routerLink]="['/packages/update-package', p._id]"
          class="text-blue-500 cursor-pointer">Edit</button>
      </div>
    </div>

  </div>

</div>

</div>
