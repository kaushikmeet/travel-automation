<div class="p-8 bg-slate-50 min-h-screen">
  <div class="flex items-center justify-between mb-10">
    <div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Travel Packages</h1>
      <p class="text-slate-500 text-sm mt-1">Manage and curate your featured travel experiences.</p>
    </div>

    <a routerLink="/packages/create-package"
       class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all active:scale-95">
      <i class="fas fa-plus text-xs"></i>
      Create Package
    </a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let p of packages"
         class="group bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden">
      
      <div class="relative overflow-hidden aspect-[16/10]">
        <img [src]="imageUrl + p.images[0]"
             class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-500"/>
        
        <div class="absolute top-4 left-4">
          <span class="bg-white/90 backdrop-blur-md text-slate-900 text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg shadow-sm">
            ₹{{ p.price }}
          </span>
        </div>
      </div>

      <div class="p-6">
        <div class="flex justify-between items-start mb-2">
          <h3 class="font-bold text-xl text-slate-800 leading-tight group-hover:text-indigo-600 transition-colors">
            {{ p.title }}
          </h3>
        </div>

        <div class="flex items-center gap-1.5 text-slate-400 text-sm mb-6">
          <i class="fas fa-map-marker-alt text-xs"></i>
          <span>{{ p.destination?.name }}</span>
          <span class="text-slate-200">|</span>
          <span>{{ p.destination?.city }}</span>
        </div>

        <div class="flex items-center gap-3 pt-4 border-t border-slate-50">
          <button [routerLink]="['/packages/update-package', p._id]"
                  class="flex-1 bg-slate-50 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 py-2.5 rounded-xl font-bold text-sm transition-colors border border-transparent hover:border-indigo-100">
            <i class="fas fa-edit mr-2"></i>Edit
          </button>
          
          <button (click)="delete(p._id)"
                  class="px-4 py-2.5 bg-white hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-xl transition-all border border-slate-100 hover:border-red-100">
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
