<div class="min-h-screen flex">

<!-- LEFT SIDE (Branding) -->
<div class="hidden md:flex w-1/2 bg-gradient-to-br from-blue-600 to-indigo-700 text-white items-center justify-center p-10">

  <div class="max-w-md">

    <h1 class="text-4xl font-bold mb-4">
      Travel Admin Panel
    </h1>

    <p class="text-lg opacity-90 mb-6">
      Create your account and start managing destinations, packages, and bookings.
    </p>

    <ul class="space-y-2 text-sm">
      <li>✔ Easy Management</li>
      <li>✔ Real-time Analytics</li>
      <li>✔ Secure Admin Access</li>
      <li>✔ Scalable System</li>
    </ul>

  </div>

</div>

<!-- RIGHT SIDE (Register Form) -->
<div class="w-full md:w-1/2 flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">

    <h2 class="text-2xl font-bold text-center mb-6">
      Create Account
    </h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <!-- Name -->
      <div>
        <label class="block text-sm text-gray-600">Name</label>
        <input
          type="text"
          formControlName="name"
          placeholder="Enter your name"
          class="w-full mt-1 p-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-600">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="w-full mt-1 p-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-600">Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full mt-1 p-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <!-- Button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition disabled:opacity-50">

        {{ loading ? 'Creating...' : 'Register' }}

      </button>

    </form>

    <!-- Error -->
    <p
      class="text-red-500 text-sm mt-4 text-center"
      *ngIf="error">
      {{ error }}
    </p>

    <!-- Login Link -->
    <p class="text-center text-sm mt-4 text-gray-600">
      Already have an account?
      <a
        routerLink="/auth/login"
        class="text-blue-600 hover:underline ml-1">
        Login
      </a>
    </p>

  </div>

</div>

</div>
