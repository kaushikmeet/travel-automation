<div class="min-h-screen bg-slate-50">
  <div class="bg-white border-b border-slate-200 py-10">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-4xl font-black text-slate-900 tracking-tight">Explore the World</h1>
      <p class="text-slate-500 mt-2 font-medium">Discover {{totalResults}} breathtaking destinations curated for you.</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col lg:flex-row gap-8">
      
      <aside class="hidden lg:block w-72 space-y-8 sticky top-8 h-fit">
        <ng-container *ngTemplateOutlet="filterContent"></ng-container>
      </aside>

      <main class="flex-1 space-y-6">
        
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center gap-4">
         <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" [(ngModel)]="filters.search" (input)="onSearch()" 
                placeholder="Search by city, country or name..." 
                class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-slate-700">
            </div>

            <div class="w-full md:w-auto">
                <select [(ngModel)]="filters.sort" (change)="applyFilters()" 
                class="w-full md:w-auto bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold text-slate-600 outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="newest">Newest First</option>
                <option value="priceLow">Price: Low to High</option>
                <option value="priceHigh">Price: High to Low</option>
                </select>
            </div>
            
        </div>
        <div *ngIf="destinations.length === 0 && !isSearching" class="text-center py-20">
            <i class="fa-solid fa-face-frown text-4xl text-slate-300 mb-4"></i>
            <p class="text-slate-500">No destinations match "{{filters.search}}"</p>
        </div>
        <div [class.opacity-50]="isSearching" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div *ngFor="let d of destinations" 
               [routerLink]="['/destinations/detail', d.slug]"
               class="group bg-white rounded-[2rem] overflow-hidden border border-slate-100 hover:shadow-2xl hover:shadow-indigo-100/50 transition-all duration-500 cursor-pointer">
            
            <div class="relative h-64 overflow-hidden">
              <img [src]="image + d.images[0] || 'assets/placeholder.jpg'" 
                   class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
              <div class="absolute top-4 left-4">
                <span class="px-3 py-1 bg-white/90 backdrop-blur-md rounded-full text-[10px] font-black uppercase tracking-widest text-slate-900 shadow-sm">
                  {{d.country}}
                </span>
              </div>
              <div class="absolute bottom-4 right-4">
                <span class="px-4 py-2 bg-indigo-600 rounded-2xl text-white font-bold text-sm">
                  ₹{{d.averagePrice}}
                </span>
              </div>
            </div>

            <div class="p-6">
              <h3 class="text-xl font-bold text-slate-900 group-hover:text-indigo-600 transition-colors">{{d.name}}</h3>
              <p class="text-slate-500 text-sm mt-1 flex items-center gap-1">
                <i class="fa-solid fa-location-dot text-indigo-400"></i> {{d.city}}
              </p>
              <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Best Season</span>
                <span class="text-xs font-bold text-slate-700">{{d.bestSeason}}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex justify-center items-center py-10 gap-2" *ngIf="totalResults > 9">
        
        <button 
            [disabled]="currentPage === 1"
            (click)="changePage(currentPage - 1)"
            class="w-12 h-12 rounded-2xl bg-white border border-slate-100 disabled:opacity-30">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button 
            *ngFor="let p of pages" 
            (click)="changePage(p)" 
            [class]="currentPage === p ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-white text-slate-400 border-slate-100'"
            class="w-12 h-12 rounded-2xl font-bold border transition-all hover:bg-indigo-50">
            {{ p }}
        </button>

        <button 
            [disabled]="currentPage === pages.length"
            (click)="changePage(currentPage + 1)"
            class="w-12 h-12 rounded-2xl bg-white border border-slate-100 disabled:opacity-30">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

        </div>
      </main>
    </div>
  </div>
</div>

<ng-template #filterContent>
  <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 space-y-8">
    <div>
      <h3 class="filter-label">Budget Range</h3>
      <input type="range" [(ngModel)]="filters.maxPrice" min="0" max="200000" step="5000" (change)="applyFilters()" class="w-full accent-indigo-600 mt-4">
      <div class="flex justify-between mt-2 text-[10px] font-bold text-slate-400">
        <span>₹0</span>
        <span>Up to ₹{{filters.maxPrice}}</span>
      </div>
    </div>

    <div>
      <h3 class="filter-label">Best Season</h3>
      <div class="flex flex-wrap gap-2 mt-4">
        <button *ngFor="let s of seasons" (click)="toggleSeason(s)"
          [class]="filters.season === s ? 'bg-indigo-600 text-white shadow-indigo-200 shadow-lg' : 'bg-slate-50 text-slate-500'"
          class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
          {{s}}
        </button>
      </div>
    </div>

    <button (click)="resetFilters()" class="w-full py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-rose-500 transition-colors">
      Reset All Filters
    </button>
  </div>
</ng-template>

<div *ngIf="showMobileFilters" class="fixed inset-0 z-50 lg:hidden">
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="toggleMobileFilters()"></div>
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-6 animate-slide-up max-h-[80vh] overflow-y-auto">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
    <ng-container *ngTemplateOutlet="filterContent"></ng-container>
  </div>
</div>

<div class="fixed bottom-1.5 right-1">
  <button (click)="toggleMobileFilters()" class="lg:hidden p-3 bg-indigo-50 text-indigo-600 rounded-xl text-sm font-bold">
    <i class="fa-solid fa-filter mr-2 text-2xl"></i>
  </button>
</div>
