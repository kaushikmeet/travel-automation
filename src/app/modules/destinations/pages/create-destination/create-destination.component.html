<div class="min-h-screen bg-slate-50 py-10 px-4">
  <div class="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
    
    <div class="bg-indigo-600 p-10 text-white relative overflow-hidden">
      <div class="relative z-10">
        <h1 class="text-4xl font-black tracking-tight">Create Destination</h1>
        <p class="mt-2 text-indigo-100 font-medium">Add a new breathtaking location to your global inventory.</p>
      </div>
      <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
    </div>

    <form [formGroup]="destionationform" (ngSubmit)="submit()" class="p-10 space-y-10">
      
      <section class="space-y-6">
        <h2 class="text-xs font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center gap-2">
          <i class="fa-solid fa-circle-info"></i> Basic Information
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="flex flex-col space-y-2">
            <label class="form-label">Destination Name</label>
            <input formControlName="name" placeholder="e.g. Bali" class="form-input">
          </div>
          <div class="flex flex-col space-y-2">
            <label class="form-label">Country</label>
            <input formControlName="country" placeholder="e.g. Indonesia" class="form-input">
          </div>
          <div class="flex flex-col space-y-2">
            <label class="form-label">City</label>
            <input formControlName="city" placeholder="e.g. Ubud" class="form-input">
          </div>
        </div>

        <div class="flex flex-col space-y-2">
          <label class="form-label">Main Description</label>
          <textarea formControlName="description" rows="4" 
            placeholder="Provide a captivating overview of this destination..." 
            class="form-input resize-none py-4"></textarea>
        </div>
      </section>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="flex flex-col space-y-2">
          <label class="form-label">Best Season to Visit</label>
          <div class="relative group">
            <i class="fa-solid fa-cloud-sun absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors"></i>
            <input formControlName="bestSeason" placeholder="e.g. April to October" class="form-input !pl-12">
          </div>
        </div>
        <div class="flex flex-col space-y-2">
          <label class="form-label">Average Price (Estimated INR)</label>
          <div class="relative group">
            <i class="fa-solid fa-indian-rupee-sign absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors"></i>
            <input type="number" formControlName="averagePrice" placeholder="50000" class="form-input !pl-12">
          </div>
        </div>
      </div>

      <section class="space-y-4">
        <h2 class="text-xs font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center gap-2">
          <i class="fa-solid fa-images"></i> Media Assets
        </h2>
        <div class="mt-1 flex justify-center px-6 pt-10 pb-10 border-2 border-slate-200 border-dashed rounded-[2rem] hover:border-indigo-400 transition-all bg-slate-50/50 group cursor-pointer relative">
          <div class="space-y-2 text-center">
            <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-300 group-hover:text-indigo-500 transition-colors"></i>
            <div class="flex text-sm text-slate-600 font-bold">
              <label class="relative cursor-pointer rounded-md text-indigo-600 hover:text-indigo-500">
                <span>Upload images</span>
                <input type="file" multiple (change)="onFileSelect($event)" class="sr-only">
              </label>
              <p class="pl-1">or drag and drop</p>
            </div>
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">
              {{selectedFiles.length}} Files Selected
            </p>
          </div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex justify-between items-center">
          <h2 class="text-xs font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center gap-2">
            <i class="fa-solid fa-star"></i> Popular Attractions
          </h2>
          <button type="button" (click)="addAttraction()" class="text-indigo-600 text-[10px] font-black uppercase tracking-widest hover:underline">+ Add Attraction</button>
        </div>
        <div formArrayName="popularAttractions" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div *ngFor="let a of attractions.controls; let i=index" class="relative group">
            <input [formControlName]="i" placeholder="Attraction Name" class="form-input">
            <button type="button" (click)="attractions.removeAt(i)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all">
               <i class="fa-solid fa-circle-xmark"></i>
            </button>
          </div>
        </div>
      </section>

      <section class="space-y-6">
      <div class="flex justify-between items-center">
        <h2 class="text-xs font-black text-indigo-600 uppercase tracking-[0.2em] flex items-center gap-2">
          <i class="fa-solid fa-map-location-dot"></i> Places to Visit
        </h2>
        <button type="button" (click)="addPlace()" 
          class="bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-indigo-100">
          + Add New Place
        </button>
      </div>

      <div formArrayName="places" class="space-y-4">
        <div *ngFor="let p of places.controls; let i=index" [formGroupName]="i" 
          class="group relative bg-slate-50/50 p-6 rounded-[2rem] border border-slate-100 hover:bg-white hover:shadow-xl hover:shadow-indigo-100/30 transition-all duration-300">
          
          <button type="button" (click)="places.removeAt(i)" 
            class="absolute -top-2 -right-2 w-8 h-8 bg-white text-rose-500 rounded-full shadow-md border border-slate-100 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-rose-500 hover:text-white">
            <i class="fa-solid fa-xmark text-xs"></i>
          </button>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col space-y-2">
              <label class="form-label">Place Name</label>
              <input formControlName="name" placeholder="e.g. Blue Lagoon" class="form-input !bg-white">
            </div>

            <div class="flex flex-col space-y-2">
              <label class="form-label">Image URL</label>
              <div class="relative">
                <i class="fa-solid fa-link absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input formControlName="image" placeholder="https://images.unsplash.com/..." class="form-input !pl-10 !bg-white">
              </div>
            </div>

            <div class="flex flex-col md:col-span-2 space-y-2">
              <label class="form-label">Short Description</label>
              <textarea formControlName="description" rows="2" 
                placeholder="What makes this specific spot unique?" 
                class="form-input !bg-white resize-none py-3"></textarea>
            </div>
          </div>
        </div>

        <div *ngIf="places.length === 0" 
          class="py-12 border-2 border-dashed border-slate-200 rounded-[2rem] text-center bg-slate-50/30">
          <i class="fa-solid fa-map-pin text-slate-200 text-3xl mb-2"></i>
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">No specific spots mapped yet</p>
        </div>
      </div>
    </section>

      <div class="pt-10 border-t border-slate-100 flex flex-col items-center gap-4">
        <button type="submit" 
          class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-slate-200 transition-all transform active:scale-[0.98] uppercase tracking-[0.2em] text-xs">
          Create New Destination Entry
        </button>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">Security Protocol Active</p>
      </div>
    </form>
  </div>
</div>
