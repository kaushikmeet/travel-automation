<div class="p-6">

<div class="flex justify-between mb-6">
<h1 class="text-2xl font-bold">Destinations</h1>

<a routerLink="/destinations/create"
class="bg-blue-600 text-white px-4 py-2 rounded">
Create Destination
</a>
</div>

<div class="grid md:grid-cols-3 gap-6">

<div *ngFor="let d of destinations"
class="bg-white shadow rounded overflow-hidden">

<img
[src]="d.images?.[0]"
class="h-48 w-full object-cover">

<div class="p-4">

<h2 class="text-lg font-bold">
{{d.name}}
</h2>

<p class="text-gray-500">
{{d.city}}, {{d.country}}
</p>

<div class="flex gap-3 mt-3 text-sm">

<a
routerLink="/destinations/update/{{d._id}}"
class="text-yellow-600">
Edit
</a>

<button
(click)="delete(d._id)"
class="text-red-600">
Delete
</button>

</div>

</div>

</div>

</div>

</div>
